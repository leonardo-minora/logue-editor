<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <title>Logue Editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        font-family: monospace;
        background-color: #1e1e1e;
        color: #d4d4d4;
      }

      header {
        padding: 8px 16px;
        background-color: #323233;
        border-bottom: 1px solid #444;
        font-size: 14px;
      }

      main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      #editor {
        flex: 1;
        resize: none;
        border: none;
        outline: none;
        padding: 16px;
        font-family: "Courier New", Courier, monospace;
        font-size: 14px;
        line-height: 1.6;
        background-color: #1e1e1e;
        color: #d4d4d4;
        tab-size: 4;
      }

      footer {
        padding: 4px 16px;
        background-color: #007acc;
        color: #fff;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <header>Logue Editor</header>
    <main>
      <textarea id="editor" spellcheck="false" placeholder="Digite seu código aqui..."></textarea>
    </main>
    <footer>Pronto</footer>
    <script src="dist/renderer/index.js"></script>
  </body>
</html>
