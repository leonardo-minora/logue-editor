<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logue Editor</title>

    <!-- CodeMirror 5 – editor com syntax highlight para Python -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/theme/monokai.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/addon/edit/matchbrackets.min.js"></script>

    <!-- marked.js – renderizador de Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>

    <!-- Estilos da aplicação -->
    <link rel="stylesheet" href="css/app.css" />
  </head>

  <body>
    <!-- ╔══════════════════════════════════════╗ -->
    <!-- ║           HEADER FIXO               ║ -->
    <!-- ╚══════════════════════════════════════╝ -->
    <header class="app-header">
      <div class="header-left">
        <span class="app-logo" aria-hidden="true">◆</span>
        <span class="app-title">Logue Editor</span>
      </div>

      <div class="header-center">
        <label for="filename" class="visually-hidden">Nome do arquivo</label>
        <input
          type="text"
          id="filename"
          class="filename-input"
          value="script.py"
          title="Nome do arquivo"
          spellcheck="false"
        />
      </div>

      <div class="header-right">
        <button class="btn btn-secondary" id="btn-new" title="Novo arquivo (Ctrl+N)">
          Novo
        </button>
        <button class="btn btn-secondary" id="btn-open" title="Abrir arquivo (Ctrl+O)">
          Abrir
        </button>
        <button class="btn btn-secondary" id="btn-save" title="Salvar arquivo (Ctrl+S)">
          Salvar
        </button>
        <button class="btn btn-primary" id="btn-run" title="Executar código">
          ▶ Executar
        </button>
      </div>
    </header>

    <!-- ╔══════════════════════════════════════╗ -->
    <!-- ║               BODY                  ║ -->
    <!-- ║  ┌──────────────┬────────────────┐  ║ -->
    <!-- ║  │   Markdown   │  Editor Python │  ║ -->
    <!-- ║  │  (esquerda)  │   (direita)    │  ║ -->
    <!-- ║  └──────────────┴────────────────┘  ║ -->
    <!-- ╚══════════════════════════════════════╝ -->
    <main class="app-body">

      <!-- Painel esquerdo: Visualizador de Markdown -->
      <section class="panel panel-markdown" id="panel-markdown" aria-label="Visualizador Markdown">
        <div class="panel-header">
          <span class="panel-title">Visualizador Markdown</span>
          <div class="panel-tabs" role="tablist">
            <button
              class="tab-btn active"
              id="tab-source"
              role="tab"
              aria-selected="true"
              aria-controls="markdown-source"
            >
              Fonte
            </button>
            <button
              class="tab-btn"
              id="tab-preview"
              role="tab"
              aria-selected="false"
              aria-controls="markdown-preview"
            >
              Prévia
            </button>
          </div>
        </div>

        <div class="panel-content">
          <textarea
            id="markdown-source"
            class="markdown-textarea"
            role="tabpanel"
            aria-labelledby="tab-source"
            placeholder="# Escreva seu Markdown aqui..."
            spellcheck="false"
          ></textarea>

          <div
            id="markdown-preview"
            class="markdown-preview hidden"
            role="tabpanel"
            aria-labelledby="tab-preview"
          ></div>
        </div>
      </section>

      <!-- Barra de redimensionamento -->
      <div
        class="panel-resizer"
        id="resizer"
        role="separator"
        aria-orientation="vertical"
        title="Arraste para redimensionar os painéis"
      ></div>

      <!-- Painel direito: Editor de código Python -->
      <section class="panel panel-editor" id="panel-editor" aria-label="Editor Python">
        <div class="panel-header">
          <span class="panel-title">Editor Python</span>
          <div class="panel-actions">
            <span id="cursor-pos" class="cursor-info" aria-live="polite">Ln 1, Col 1</span>
          </div>
        </div>

        <div class="panel-content" id="editor-container">
          <!-- O CodeMirror substitui este textarea -->
          <textarea id="python-editor" aria-label="Editor de código Python"></textarea>
        </div>
      </section>

    </main>

    <!-- Lógica da aplicação -->
    <script src="js/app.js"></script>
  </body>
</html>
