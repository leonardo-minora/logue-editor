<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logue Editor</title>
    <link rel="stylesheet" href="../node_modules/codemirror/lib/codemirror.css" />
    <link rel="stylesheet" href="../node_modules/codemirror/theme/material-darker.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="header-group branding">
          <div class="user-chip">
            <span class="user-status" aria-hidden="true"></span>
            <div>
              <strong>Usuário conectado</strong>
              <span>Convidado</span>
            </div>
          </div>
          <div class="title-block">
            <span class="eyebrow">Logue</span>
            <h1>Editor de texto com visualização</h1>
          </div>
        </div>

        <div class="header-group actions">
          <label class="search-box">
            <span aria-hidden="true">🔎</span>
            <input id="search-input" type="search" placeholder="Pesquisar no editor" />
          </label>
          <button id="search-button" type="button" class="icon-button">Pesquisar</button>
          <button type="button" class="icon-button">Login</button>
          <button type="button" class="icon-button">Logout</button>
          <button type="button" class="icon-button">Perfil</button>
          <button type="button" class="icon-button icon-button--accent">▶ Play</button>
          <button id="toggle-left" type="button" class="icon-button">Ocultar editor</button>
          <button id="toggle-right" type="button" class="icon-button">Ocultar visualizador</button>
          <button id="reset-layout" type="button" class="icon-button">Dividir 50/50</button>
        </div>
      </header>

      <main class="app-body">
        <section id="left-pane" class="pane">
          <div class="pane-header">
            <h2>CodeMirror</h2>
            <span>Editor principal</span>
          </div>
          <div id="editor" class="pane-content editor-host"></div>
        </section>

        <div id="divider" class="divider" role="separator" aria-orientation="vertical" tabindex="0"></div>

        <section id="right-pane" class="pane">
          <div class="pane-header">
            <h2>Marked</h2>
            <span>Visualizador de texto</span>
          </div>
          <article id="preview" class="pane-content preview-content"></article>
        </section>
      </main>
    </div>

    <script src="../node_modules/codemirror/lib/codemirror.js"></script>
    <script src="../node_modules/codemirror/mode/markdown/markdown.js"></script>
    <script src="../node_modules/codemirror/addon/search/searchcursor.js"></script>
    <script src="../node_modules/marked/lib/marked.umd.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
